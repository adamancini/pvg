version: 2

builds:
  - id: pvg
    binary: pvg
    main: ./cmd/pvg/
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: default
    formats:
      - tar.gz

checksum:
  name_template: checksums.txt

release:
  github:
    owner: paivot-ai
    name: pvg
